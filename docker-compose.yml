services:

  # ── Backend API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
      target: dev
    command: ./scripts/start_api.sh
    environment:
      APP_ENV: development
      SECRET_KEY: dev-secret-key-change-this-in-production-32chars
      DATABASE_URL: postgresql+asyncpg://studentsclub:dev@postgres:5432/studentsclub
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: studentsclub-uploads
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      AI_PROVIDER: mock
      QDRANT_URL: http://qdrant:6333
      UNSTRUCTURED_API_URL: http://unstructured-api:8000
      EXTRACTION_BACKEND: unstructured
      # Phase 2 credential store — Fernet (url-safe 32-byte base64). Override in prod.
      AI_CREDENTIAL_KEY: ${AI_CREDENTIAL_KEY:-laOuz-EkAKsMMOH4ZTxBxnzziJH9zGJm5gNdRSmipM8=}
      # Default admin seeded on first boot when no admin exists.
      # Override these (especially the password) for any non-local deployment.
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@studentsclub.io}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin12345}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME:-Default Admin}
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ── Celery Worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
      target: dev
    command: ./scripts/start_worker.sh
    environment:
      APP_ENV: development
      SECRET_KEY: dev-secret-key-change-this-in-production-32chars
      DATABASE_URL: postgresql+asyncpg://studentsclub:dev@postgres:5432/studentsclub
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: studentsclub-uploads
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      AI_PROVIDER: mock
      QDRANT_URL: http://qdrant:6333
      UNSTRUCTURED_API_URL: http://unstructured-api:8000
      EXTRACTION_BACKEND: unstructured
      AI_CREDENTIAL_KEY: ${AI_CREDENTIAL_KEY:-laOuz-EkAKsMMOH4ZTxBxnzziJH9zGJm5gNdRSmipM8=}
      # Worker is a consumer — don't re-run migrations from here.
      RUN_MIGRATIONS: "0"
      # Each Celery task runs in its own event loop — use NullPool so DB
      # connections never get reused across a closed loop.
      WORKER_MODE: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      unstructured-api:
        condition: service_started
      api:
        condition: service_started
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ── Celery Beat ────────────────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
      target: dev
    command: ./scripts/start_beat.sh
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: studentsclub
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: studentsclub
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studentsclub"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── unstructured-api (document extraction) ────────────────────────────────
  unstructured-api:
    image: quay.io/unstructured-io/unstructured-api:latest
    ports:
      - "8001:8000"
    environment:
      # Allow longer documents; the API caps request bytes by default.
      UNSTRUCTURED_ALLOWED_MIMETYPES: "*"
    restart: unless-stopped

  # ── Qdrant (Vector DB for RAG) ────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    # The qdrant image is minimal (no curl/wget) so we can't easily
    # exec a healthcheck. Boot is ~2s; client retries cover the race.
    restart: unless-stopped

  # ── MinIO (S3-compatible storage) ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  pg_data:
  minio_data:
  qdrant_data:
