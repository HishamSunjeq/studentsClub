<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>StudentsClub</title>
    <script>
      // No-flash bootstrap. next-themes handles the runtime, but the first paint
      // must already have the right classes — otherwise users see a flash.
      // Mirrors the THEME_STORAGE_KEY / ACCENT_STORAGE_KEY / DEFAULT_ACCENT
      // constants from src/lib/themes.ts.
      (function () {
        try {
          var d = document.documentElement;

          // Color scheme: stored 'light'|'dark'|'system'|null → resolve to a class
          var theme = localStorage.getItem("sc-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved =
            theme === "light" || theme === "dark"
              ? theme
              : prefersDark
              ? "dark"
              : "light";
          d.classList.remove("light", "dark");
          d.classList.add(resolved);

          // Accent: stored id or the indigo default
          var validAccents = ["indigo", "emerald", "amber", "rose", "sky", "violet"];
          var accent = localStorage.getItem("sc-accent");
          if (validAccents.indexOf(accent) === -1) accent = "indigo";
          for (var i = 0; i < d.classList.length; i++) {
            if (d.classList[i].indexOf("accent-") === 0) {
              d.classList.remove(d.classList[i]);
              i--;
            }
          }
          d.classList.add("accent-" + accent);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
