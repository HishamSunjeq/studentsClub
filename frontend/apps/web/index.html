<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>StudentsClub</title>
    <script>
      // Theme bootstrap — dark is default; honor explicit user choice persisted in localStorage.
      // Phase 10 will replace this with a full settings-driven theme switcher.
      (function () {
        try {
          var saved = localStorage.getItem("sc-theme");
          var prefersLight =
            saved === "light" ||
            (!saved && window.matchMedia("(prefers-color-scheme: light)").matches);
          if (prefersLight) {
            document.documentElement.classList.remove("dark");
            document.documentElement.classList.add("light");
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
